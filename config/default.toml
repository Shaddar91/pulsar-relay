[scheduler]
#interval in seconds (60 = 1 minute)
interval_secs = 60
#path to AI task automation pipeline ready directory
pipeline_ready_dir = "${AI_PROJECT_ROOT}/data/pipeline/ready"
#path to pipeline processing directory
pipeline_processing_dir = "${AI_PROJECT_ROOT}/data/pipeline/processing"
#path to pipeline completed directory
pipeline_completed_dir = "${AI_PROJECT_ROOT}/data/pipeline/completed"
#path to scheduler's own task queue
task_queue_dir = "${PULSAR_RELAY_DIR}/data/tasks"
#lock file path
lock_file = "/tmp/pulsar-relay.lock"

[kafka]
brokers = "localhost:9092"
task_topic = "pulsar.tasks"
result_topic = "pulsar.results"
group_id = "pulsar-relay-scheduler"

[plans]
#plan lifecycle directories — Forge/Obsidian is source of truth for visual overview
#env var overrides: PULSAR_PLANS_DRAFTS_DIR, etc.
drafts_dir = "${FORGE_DIR}/projects/pulsar-relay/plans/drafts"
active_dir = "${FORGE_DIR}/projects/pulsar-relay/plans/active"
completed_dir = "${FORGE_DIR}/projects/pulsar-relay/plans/completed"
failed_dir = "${FORGE_DIR}/projects/pulsar-relay/plans/failed"

[telegram]
enabled = true
bot_token_env = "TELEGRAM_BOT_TOKEN"
chat_id_env = "TELEGRAM_OWNER_ID"
notify_plan_completed = true
notify_plan_failed = true
notify_component_completed = false

[agent]
#path to spawn-agent-v2.sh
spawn_script = "${AI_PROJECT_ROOT}/scripts/spawn-agent-v2.sh"
#default model for spawned agents
default_model = "sonnet"
#timeout per component in seconds (30 min)
component_timeout_secs = 1800
